server {
    listen 80;
    server_name portafolioagustinzelaya.com www.portafolioagustinzelaya.com;

    client_max_body_size 100M; # Para que tus videos suban sin problemas

    location / {
        proxy_pass http://web:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }
}